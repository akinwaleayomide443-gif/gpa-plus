<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bionexus Pro | Final V5.2</title>

<style>
:root { --primary:#00d2ff; --secondary:#3a7bd5; --bg:#f8f9fa; --card:#ffffff; --text:#2d3436; --border:rgba(0,0,0,0.1);}
[data-theme="dark"] { --bg:#121212; --card:#1e1e1e; --text:#f8f9fa; --border:rgba(255,255,255,0.1); }

body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); padding:15px; transition:0.3s; margin:0; }
.dashboard { max-width:800px; margin:auto; padding-top: 20px; }
.card { background:var(--card); padding:20px; border-radius:20px; margin-bottom:20px; border:1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.row { display:grid; grid-template-columns:2fr 1fr 1.5fr; gap:10px; margin-bottom:10px; }

input, select { padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size: 14px; outline: none; }
input:focus { border-color: var(--primary); }

.summary-box {
    text-align:center;
    padding:25px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color:white;
    border-radius:25px;
    margin-bottom:25px;
    box-shadow: 0 10px 30px rgba(58, 123, 213, 0.3);
}

.status-container {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    transition: all 0.4s ease;
    background: rgba(255, 255, 255, 0.1);
}

button { padding:12px; border-radius:12px; border:none; font-weight:bold; cursor:pointer; transition: 0.2s; }
button:active { transform: scale(0.96); }
.btn-add { background: var(--secondary); color:white; width:100%; margin-top:10px; }
.btn-theme { position:fixed; top:20px; right:20px; width:45px; height:45px; border-radius:50%; background: var(--card); border: 1px solid var(--border); z-index: 1000; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

h3 { margin-top: 0; color: var(--secondary); font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 10px; }
footer { text-align:center; opacity:0.5; padding: 20px 0; font-size: 0.8rem; letter-spacing: 0.5px; }

/* Desktop Tweaks */
@media (min-width: 600px) {
    .row { gap: 20px; }
}
</style>
</head>

<body data-theme="light">

<button class="btn-theme" onclick="toggleTheme()">🌓</button>

<div class="dashboard">

<div class="summary-box">
    <h1 style="margin:0; font-size: 2rem;">Bionexus Pro</h1>
    <p style="margin: 5px 0 20px 0; opacity: 0.8; font-size: 0.85rem; font-weight: 300;">Strategic Academic Manager | BME '29</p>

    <div style="margin-bottom: 20px;">
        <label style="font-size: 0.7rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; opacity: 0.9;">Target CGPA</label>
        <input type="number" id="target" oninput="calculateAll()" placeholder="e.g. 4.50" step="0.01" style="width: 60%; border:none; text-align: center; font-size: 1.2rem; font-weight: bold;">
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 20px;">
        <div><small style="opacity: 0.8;">GPA 1</small><br><strong id="gpa1-val" style="font-size: 1.2rem;">0.00</strong></div>
        <div><small style="opacity: 0.8;">GPA 2</small><br><strong id="gpa2-val" style="font-size: 1.2rem;">0.00</strong></div>
        <div><small style="opacity: 0.8;">CGPA</small><br><strong id="cgpa-val" style="font-size:1.8rem;">0.00</strong></div>
    </div>

    <div id="status-msg" class="status-container">
        Set a target to begin analysis
    </div>
</div>

<div class="card">
    <h3>1st Semester Results</h3>
    <div id="sem1-list">
        <div class="row">
            <input type="text" placeholder="Course Code">
            <select class="u1" onchange="calculateAll()">
                <option value="3">3U</option>
                <option value="2">2U</option>
                <option value="1">1U</option>
                <option value="4">4U</option>
            </select>
            <select class="g1" onchange="calculateAll()">
                <option value="5">A</option>
                <option value="4">B</option>
                <option value="3">C</option>
                <option value="2">D</option>
                <option value="1">E</option>
                <option value="0">F</option>
            </select>
        </div>
    </div>
    <button class="btn-add" onclick="addRow('sem1-list','u1','g1')">+ Add Course</button>
</div>

<div class="card">
    <h3>2nd Semester Prediction</h3>
    <div id="sem2-list">
        <div class="row">
            <input type="text" placeholder="Course Code">
            <select class="u2" onchange="calculateAll()">
                <option value="3">3U</option>
                <option value="2">2U</option>
                <option value="1">1U</option>
                <option value="4">4U</option>
            </select>
            <select class="g2" onchange="calculateAll()">
                <option value="5">A</option>
                <option value="4">B</option>
                <option value="3">C</option>
                <option value="2">D</option>
                <option value="1">E</option>
                <option value="0">F</option>
            </select>
        </div>
    </div>
    <button class="btn-add" onclick="addRow('sem2-list','u2','g2')">+ Add Course</button>
</div>

<footer>
    Developed by Akinwale Akinfolarin | BME '29
</footer>

</div>

<script>
// THEME TOGGLE
function toggleTheme(){
    const b=document.body;
    const current = b.getAttribute('data-theme');
    b.setAttribute('data-theme', current ==='light'?'dark':'light');
}

// ADD NEW ROW
function addRow(id,u,g){
    const div=document.createElement('div');
    div.className='row';
    div.innerHTML=`
        <input type="text" placeholder="Course">
        <select class="${u}" onchange="calculateAll()">
            <option value="3">3U</option>
            <option value="2">2U</option>
            <option value="1">1U</option>
            <option value="4">4U</option>
            <option value="6">6U</option>
        </select>
        <select class="${g}" onchange="calculateAll()">
            <option value="5">A</option>
            <option value="4">B</option>
            <option value="3">C</option>
            <option value="2">D</option>
            <option value="1">E</option>
            <option value="0">F</option>
        </select>`;
    document.getElementById(id).appendChild(div);
}

// CALCULATION LOGIC
function calculateAll(){
    // Semester 1
    let p1=0, u1=0;
    const units1 = document.getElementsByClassName('u1');
    const grades1 = document.getElementsByClassName('g1');
    for(let i=0; i<units1.length; i++){
        p1 += parseInt(units1[i].value) * parseInt(grades1[i].value);
        u1 += parseInt(units1[i].value);
    }
    let gpa1 = u1 > 0 ? p1/u1 : 0;
    document.getElementById('gpa1-val').innerText = gpa1.toFixed(2);

    // Semester 2
    let p2=0, u2=0;
    const units2 = document.getElementsByClassName('u2');
    const grades2 = document.getElementsByClassName('g2');
    for(let i=0; i<units2.length; i++){
        p2 += parseInt(units2[i].value) * parseInt(grades2[i].value);
        u2 += parseInt(units2[i].value);
    }
    let gpa2 = u2 > 0 ? p2/u2 : 0;
    document.getElementById('gpa2-val').innerText = gpa2.toFixed(2);

    // Total CGPA
    let cgpa = (u1 + u2) > 0 ? (p1 + p2) / (u1 + u2) : 0;
    document.getElementById('cgpa-val').innerText = cgpa.toFixed(2);

    // Class of Degree
    let classLabel = "";
    if(cgpa >= 4.5) classLabel = "First Class";
    else if(cgpa >= 3.5) classLabel = "Second Class Upper (2:1)";
    else if(cgpa >= 2.4) classLabel = "Second Class Lower (2:2)";
    else if(cgpa >= 1.5) classLabel = "Third Class";
    else classLabel = "Pass / Probation";

    // Target Emotion Logic
    const target = parseFloat(document.getElementById('target').value);
    const statusBox = document.getElementById('status-msg');
    let statusMsg = "";
    let bgColor = "rgba(255, 255, 255, 0.15)"; // Default Neutral

    if(target){
        if(cgpa >= target){
            statusMsg = `🔥 On Track for ${target.toFixed(2)}`;
            bgColor = "rgba(85, 239, 196, 0.4)"; // Success Green
        } else {
            let gap = (target - cgpa).toFixed(2);
            statusMsg = `⚠️ Need +${gap} to reach ${target.toFixed(2)}`;
            bgColor = "rgba(255, 118, 117, 0.4)"; // Alert Red
        }
    } else {
        statusMsg = "Set a target to begin analysis";
    }

    statusBox.style.background = bgColor;
    statusBox.innerHTML = `
        <span style="letter-spacing: 1.5px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 5px;">${classLabel}</span>
        <span style="font-size: 0.9rem; font-weight: 400;">${statusMsg}</span>
    `;
}
</script>

</body>
</html>
